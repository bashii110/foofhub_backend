version: "3.9"

services:
  # ── Laravel Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    image: foodhub-backend:latest
    container_name: foodhub_app
    restart: always
    environment:
      APP_ENV:      production
      APP_DEBUG:    "false"
      DB_HOST:      mysql
      REDIS_HOST:   redis
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foodhub_net
    ports:
      - "80:80"

  # ── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    image: foodhub-backend:latest
    container_name: foodhub_queue
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=60 --max-jobs=500
    env_file: .env
    depends_on:
      - app
      - redis
    networks:
      - foodhub_net

  # ── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    image: foodhub-backend:latest
    container_name: foodhub_scheduler
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file: .env
    depends_on:
      - app
    networks:
      - foodhub_net

  # ── MySQL ───────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: foodhub_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_DATABASE:-foodhub}
      MYSQL_USER:          ${DB_USERNAME:-foodhub_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodhub_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: foodhub_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodhub_net

  # ── Nginx (reverse proxy / SSL termination) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: foodhub_nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
      - storage_data:/var/www/html/storage/app/public
    depends_on:
      - app
    networks:
      - foodhub_net

volumes:
  mysql_data:
  redis_data:
  storage_data:
  logs_data:

networks:
  foodhub_net:
    driver: bridge